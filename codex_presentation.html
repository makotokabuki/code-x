<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>CodeXの機能紹介</title>
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        section {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .slide {
            page-break-after: always;
            display: none;
        }
        .slide.active {
            display: flex;
        }
        .nav-button {
            position: fixed;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2rem;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            cursor: pointer;
        }
        #prev { left: 1rem; }
        #next { right: 1rem; }
    </style>
</head>
<body>
    <section class="slide">
        <h1>CodeX プレゼンテーション</h1>
        <p>OpenAIのコード生成AI「Codex」について紹介します。</p>
    </section>

    <section class="slide">
        <h2>CodeXとは</h2>
        <ul>
            <li>自然言語からコードを生成するAI</li>
            <li>GPT-3を基盤としたモデル</li>
            <li>GitHub Copilotなどで利用</li>
        </ul>
    </section>

    <section class="slide">
        <h2>主な機能</h2>
        <ul>
            <li>コード補完・自動生成</li>
            <li>既存コードの理解と説明</li>
            <li>複数のプログラミング言語をサポート</li>
        </ul>
    </section>

    <section class="slide">
        <h2>利用例</h2>
        <ul>
            <li>開発効率の向上</li>
            <li>教育や学習支援</li>
            <li>コードレビューの補助</li>
        </ul>
    </section>

    <section class="slide">
        <h2>まとめ</h2>
        <p>Codexはコード生成と理解を支援する強力なAIツールです。</p>
    </section>

    <button id="prev" class="nav-button">&larr;</button>
    <button id="next" class="nav-button">&rarr;</button>

    <script>
        const slides = document.querySelectorAll('.slide');
        let current = 0;
        function showSlide(index) {
            slides[current].classList.remove('active');
            current = (index + slides.length) % slides.length;
            slides[current].classList.add('active');
        }
        document.getElementById('next').addEventListener('click', () => {
            showSlide(current + 1);
        });
        document.getElementById('prev').addEventListener('click', () => {
            showSlide(current - 1);
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') showSlide(current + 1);
            if (e.key === 'ArrowLeft') showSlide(current - 1);
        });
        // 初期表示
        slides[current].classList.add('active');
    </script>
</body>
</html>
